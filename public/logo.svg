<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#10b981" />
      <stop offset="100%" stopColor="#047857" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#fbbf24" />
      <stop offset="100%" stopColor="#d97706" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#ffffff" />
      <stop offset="94%" stopColor="#94a3b8" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#10b981" />
      <stop offset="50%" stopColor="#fbbf24" />
      <stop offset="100%" stopColor="#047857" />
    </linearGradient>
  </defs>
  
  <!-- Outer elegant rings -->
  <circle cx="50" cy="50" r="46" stroke="url(#ringGrad)" strokeWidth="1.5" strokeDasharray="3 3" opacity="0.7" />
  <circle cx="50" cy="50" r="41" stroke="url(#ringGrad)" strokeWidth="2.5" />
  
  <!-- Leaf wrapping background -->
  <path d="M 28 58 C 24 38, 38 22, 68 26 C 54 36, 46 48, 28 58 Z" fill="url(#emeraldGrad)" />
  <path d="M 38 42 C 34 28, 48 18, 72 22 C 60 30, 52 38, 38 42 Z" fill="url(#emeraldGrad)" opacity="0.4" />

  <!-- Sleek Geometric Gold Truck inside the leaf -->
  <!-- Cargo bed -->
  <path d="M 36 44 L 56 44 L 56 54 L 36 54 Z" fill="url(#goldGrad)" />
  <!-- Cargo leaf vein lines -->
  <path d="M 38 49 Q 47 47 54 49" stroke="#047857" strokeWidth="1.5" strokeLinecap="round" fill="none" />
  <path d="M 43 49 L 45 46" stroke="#047857" strokeWidth="1" strokeLinecap="round" />
  <path d="M 49 49 L 51 46" stroke="#047857" strokeWidth="1" strokeLinecap="round" />

  <!-- Cabin -->
  <path d="M 59 45 L 66 45 C 68 45, 69 46, 70 48 L 72 51 C 73 52, 73 53, 73 54 L 59 54 Z" fill="url(#goldGrad)" />
  <!-- Windshield -->
  <path d="M 66 46 L 70 51 L 60 51 L 60 46 Z" fill="#047857" opacity="0.8" />
  
  <!-- Wheels -->
  <circle cx="43" cy="57" r="3.5" fill="url(#silverGrad)" stroke="#1e293b" strokeWidth="1.5" />
  <circle cx="43" cy="57" r="1" fill="#1e293b" />
  <circle cx="65" cy="57" r="3.5" fill="url(#silverGrad)" stroke="#1e293b" strokeWidth="1.5" />
  <circle cx="65" cy="57" r="1" fill="#1e293b" />
</svg>
